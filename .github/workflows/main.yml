name: QA Automation Suite CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # Regressão diária às 2am

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build com Maven (pular testes)
      run: mvn clean install -DskipTests

    - name: Run API Tests
      run: mvn test -pl qa-api
      continue-on-error: true

    - name: Run Web Tests
      run: mvn test -pl qa-web
      continue-on-error: true

    - name: Run Mobile Tests
      run: mvn test -pl qa-mobile
      continue-on-error: true

    - name: Gerar Allure Report
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
        tar -zxvf allure-2.29.0.tgz -C /opt/
        sudo ln -s /opt/allure-2.29.0/bin/allure /usr/bin/allure
        allure generate **/target/allure-results --clean -o target/allure-report
      
    - name: Upload Evidências (Screenshots + Reports)
      uses: actions/upload-artifact@v3
      with:
        name: test-evidencias
        path: |
          **/evidencias/
          target/allure-report/
